<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A Box of Love & Music ✨</title>
    <style>
        body {
            background-color: #FFF0F5; /* Soft, cozy lavender-pink background */
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            text-align: center;
            color: #4A4A4A;
        }

        .container {
            background: white;
            padding: 30px;
            border-radius: 25px;
            box-shadow: 0 10px 25px rgba(255, 182, 193, 0.5);
            max-width: 500px;
            width: 90%;
            z-index: 10;
        }

        img {
            max-width: 200px;
            border-radius: 15px;
            margin-bottom: 20px;
        }

        h1 {
            font-size: 1.4rem;
            line-height: 1.6;
            margin-bottom: 25px;
            color: #D63384;
        }

        .btn {
            background-color: #FF69B4;
            color: white;
            border: none;
            padding: 12px 25px;
            font-size: 1.1rem;
            border-radius: 50px;
            cursor: pointer;
            font-weight: bold;
            transition: transform 0.2s, background-color 0.2s;
            text-decoration: none;
            display: inline-block;
        }

        .btn:hover {
            background-color: #FF1493;
            transform: scale(1.05);
        }

        /* This creates the floating hearts effect */
        .heart {
            position: absolute;
            color: #FFB6C1;
            font-size: 20px;
            animation: float 4s linear infinite;
            bottom: -50px;
            opacity: 0;
        }

        @keyframes float {
            0% { transform: translateY(0) rotate(0deg); opacity: 1; }
            100% { transform: translateY(-110vh) rotate(360deg); opacity: 0; }
        }
    </style>
</head>
<body>

    <div class="container">
        <img src="{{ url_for('static', filename=booster.image) }}" alt="Cute comfort image">
        
        <h1>{{ booster.message }}</h1>
        
        <a href="/" class="btn">Click for another hug & song! ❤️</a>
        
        <audio id="bgm" autoplay loop>
            <source src="{{ url_for('static', filename=booster.bgm) }}" type="audio/mpeg">
        
        <p style="font-size: 0.8rem; color: #aaa; margin-top: 15px;">
            🎵 Soft Tamil BGM Playing... <br>
            (If the music doesn't start instantly, click anywhere on the screen! Modern browsers require a click to play music).
        </p>
    </div>

    <script>
        function createHeart() {
            const heart = document.createElement('div');
            heart.classList.add('heart');
            heart.innerHTML = '❤️';
            heart.style.left = Math.random() * 100 + 'vw';
            heart.style.animationDuration = Math.random() * 2 + 3 + 's';
            heart.style.fontSize = Math.random() * 20 + 15 + 'px';
            document.body.appendChild(heart);
            setTimeout(() => { heart.remove(); }, 5000);
        }
        setInterval(createHeart, 400);

        // Ensures music plays when the user clicks the refresh button or anywhere on screen
        document.body.addEventListener('click', () => {
            document.getElementById('bgm').play();
        });
    </script>
</body>
</html>
